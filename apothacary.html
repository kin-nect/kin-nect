              ))}
            </ul>

            <p style={{ fontFamily:"'Space Mono',monospace", fontSize:'0.42rem', letterSpacing:'0.25em', textTransform:'uppercase', color:item.color, margin:'0 0 8px' }}>How to use</p>
            <p style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:'0.85rem', color:'#c8b890', lineHeight:1.7, margin:'0 0 1.25rem' }}>{item.usage}</p>

            <div style={{ background:'rgba(180,50,30,0.08)', border:'1px solid rgba(180,50,30,0.2)', borderRadius:4, padding:'10px 12px' }}>
              <p style={{ margin:0, fontSize:'0.78rem', color:'#a06050', lineHeight:1.5, fontFamily:"'Cormorant Garamond',serif" }}>
                <strong style={{ color:'#c07060', letterSpacing:'0.08em' }}>NOTE: </strong>{item.caution}
              </p>
            </div>
          </div>
        </div>
      );
    }

    // ── MAIN APP ──
    function App() {
      const [board, setBoard] = React.useState('herbs');
      const [herbCat, setHerbCat] = React.useState('all');
      const [oilCat, setOilCat] = React.useState('all');
      const [plantCat, setPlantCat] = React.useState('all');
      const [pantryCat, setPantryCat] = React.useState('all');
      const [modal, setModal] = React.useState(null);

      const boards = [
        { id:'herbs',   label:'🌿 Herbalism',      desc:'Teas, leaves, roots and bark. Everyday plant healing — what your grandmother knew.' },
        { id:'oils',    label:'🫧 Aromatherapy',    desc:'Essential oils for healing, mood, space and ritual. The olfactory path to the nervous system.' },
        { id:'plants',  label:'🌀 Plant Medicine',  desc:'Sacred plants that work on consciousness. Used ceremonially, with intention and respect.' },
        { id:'pantry',  label:'🍽 The Pantry',      desc:'Food as medicine. Sea moss, medicinal mushrooms, healing fruits. The kitchen as apothecary.' },
      ];

      const filtered = (items, cat) => {
        if (cat === 'all') return items;
        if (cat === 'drfire') return items.filter(i => i.drfire);
        if (cat === 'drsebi') return items.filter(i => i.drsebi || i.category === 'drsebi');
        return items.filter(i => i.category === cat);
      };

      const currentItems = board === 'herbs' ? filtered(teas, herbCat)
        : board === 'oils' ? filtered(oils, oilCat)
        : board === 'plants' ? filtered(plants, plantCat)
        : filtered(pantry, pantryCat);

      const currentCats = board === 'herbs' ? herbCategories
        : board === 'oils' ? oilCategories
        : board === 'plants' ? plantCategories
        : pantryCategories;

      const currentCat = board === 'herbs' ? herbCat
        : board === 'oils' ? oilCat
        : board === 'plants' ? plantCat
        : pantryCat;

      const setCurrentCat = board === 'herbs' ? setHerbCat
        : board === 'oils' ? setOilCat
        : board === 'plants' ? setPlantCat
        : setPantryCat;

      const currentBoard = boards.find(b => b.id === board);

      return (
        <div style={{ minHeight:'100vh', background:'#0d0a06', color:'#e8dcc8', fontFamily:'Georgia,serif', padding:'2rem' }}>
          
          {/* Header */}
          <div style={{ maxWidth:1200, margin:'0 auto 2rem' }}>
            <p style={{ fontFamily:"'Space Mono',monospace", fontSize:'0.65rem', letterSpacing:'0.25em', textTransform:'uppercase', color:'#c8732a', opacity:0.9, marginBottom:'0.5rem' }}>✦ Personal Reference</p>
            <h1 style={{ fontFamily:"'Playfair Display',serif", fontSize:'2.6rem', fontWeight:'normal', color:'#e8dcc8', marginBottom:'0.5rem' }}>The <em style={{color:'#c8732a', fontStyle:'italic'}}>Apothecary</em></h1>
            <p style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:'1.25rem', color:'#c8b890', fontStyle:'italic', letterSpacing:'0.03em' }}>Herbalism · Aromatherapy · Plant Medicine · Food as Medicine</p>
          </div>

          {/* Board tabs */}
          <div style={{ maxWidth:1200, margin:'0 auto 0.75rem', display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:'0.5rem' }}>
            {boards.map(b => (
              <button
                key={b.id}
                onClick={() => setBoard(b.id)}
                style={{
                  padding:'0.85rem 0.75rem',
                  background: board === b.id ? 'rgba(200,115,42,0.12)' : 'rgba(255,255,255,0.02)',
                  border: board === b.id ? '1px solid rgba(200,115,42,0.5)' : '1px solid rgba(232,220,200,0.1)',
                  borderRadius:6,
                  color: board === b.id ? '#c8732a' : '#a09080',
                  fontFamily:"Georgia, serif",
                  fontSize:'0.95rem',
                  letterSpacing:'0.02em',
                  cursor:'pointer',
                  textAlign:'center',
                  transition:'all 0.15s',
                }}
              >{b.label}</button>
            ))}
          </div>

          {/* Board description */}
          <div style={{ maxWidth:1200, margin:'0 auto 1.5rem', padding:'0.75rem 1rem', background:'rgba(200,115,42,0.04)', border:'1px solid rgba(200,115,42,0.08)', borderRadius:6 }}>
            <p style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:'1.05rem', color:'#a09070', fontStyle:'italic', margin:0, lineHeight:1.6 }}>{currentBoard.desc}</p>
          </div>

          {/* Category filters */}
          <div style={{ maxWidth:1200, margin:'0 auto 1.5rem', display:'flex', gap:8, flexWrap:'wrap' }}>
            {Object.entries(currentCats).map(([key, val]) => (
              <button
                key={key}
                onClick={() => setCurrentCat(key)}
                style={{
                  padding:'4px 12px',
                  border: currentCat === key ? `1px solid ${val.color}` : '1px solid rgba(232,184,75,0.1)',
                  borderRadius:'2rem',
                  background: currentCat === key ? val.color + '20' : 'transparent',
                  color: currentCat === key ? '#e8dcc8' : '#5a4a3a',
                  fontFamily:'Georgia,serif',
                  fontSize:'0.9rem',
                  cursor:'pointer',
                  transition:'all 0.15s',
                }}
              >{val.label}</button>
            ))}
          </div>

          {/* Grid */}
          <div style={{ maxWidth:1200, margin:'0 auto', display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(175px,1fr))', gap:'1rem' }}>
            {currentItems.map((item, i) => (
              <ItemCard key={i} item={item} onClick={setModal} />
            ))}
          </div>

          {/* Modal */}
          {modal && <Modal item={modal} onClose={() => setModal(null)} />}
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
