<!DOCTYPE html>
<html lang="en">
<head>

<title>The Apothecary</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;background:#0d0a06;color:#e8dcc8;font-family:Georgia,serif}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#0d0a06}::-webkit-scrollbar-thumb{background:#3a3020;border-radius:3px}
button{cursor:pointer;font-family:inherit}
.wrap{max-width:1200px;margin:0 auto;padding:2rem 1.5rem}
.hdr-label{font-family:monospace;font-size:0.72rem;letter-spacing:0.25em;text-transform:uppercase;color:#c8732a;margin-bottom:0.5rem}
.hdr-title{font-size:2.6rem;font-weight:400;color:#e8dcc8;margin-bottom:0.5rem}
.hdr-title em{color:#c8732a;font-style:italic}
.hdr-sub{font-size:1.2rem;color:#c8b890;font-style:italic;letter-spacing:0.03em;margin-bottom:2rem}
.boards{display:grid;grid-template-columns:repeat(5,1fr);gap:0.5rem;margin-bottom:0.75rem}
.board-btn{padding:0.85rem 0.75rem;background:rgba(255,255,255,0.02);border:1px solid rgba(232,220,200,0.1);border-radius:6px;color:#a09080;font-size:1rem;text-align:center;transition:all 0.15s}
.board-btn.active{background:rgba(200,115,42,0.12);border-color:rgba(200,115,42,0.5);color:#c8732a}
.board-desc{padding:0.75rem 1rem;background:rgba(200,115,42,0.04);border:1px solid rgba(200,115,42,0.08);border-radius:6px;margin-bottom:1.5rem;font-style:italic;font-size:1.05rem;color:#a09070;line-height:1.6}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.5rem}
.filter-btn{padding:5px 14px;border:1px solid rgba(232,184,75,0.1);border-radius:2rem;background:transparent;color:#5a4a3a;font-size:0.95rem;transition:all 0.15s}
.filter-btn.active{color:#e8dcc8}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:1rem}
.card{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:8px;padding:1.25rem;cursor:pointer;transition:all 0.2s;position:relative}
.card:hover{transform:translateY(-2px)}
.card-dot{position:absolute;top:12px;right:12px;width:8px;height:8px;border-radius:50%;opacity:0.7}
.card-badges{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
.badge{font-family:monospace;font-size:0.62rem;letter-spacing:0.04em;padding:2px 6px;border-radius:2px}
.badge-fire{background:rgba(200,80,30,0.15);color:#d4733a;border:1px solid rgba(200,80,30,0.3)}
.badge-sebi{background:rgba(46,139,87,0.15);color:#5aaa7a;border:1px solid rgba(46,139,87,0.3)}
.card-emoji{font-size:1.8rem;display:block;margin-bottom:8px}
.card-name{font-size:0.95rem;color:#e8dcc8;margin-bottom:3px}
.card-tag{font-size:0.82rem;font-style:italic;margin-bottom:8px}
.card-tap{font-family:monospace;font-size:0.6rem;letter-spacing:0.1em;color:#6a5a4a;margin-top:6px}
.meta-tag{font-family:monospace;font-size:0.6rem;color:#5a4a3a;letter-spacing:0.06em;margin-bottom:4px}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:9999;align-items:center;justify-content:center;padding:1rem}
.modal-overlay.open{display:flex}
.modal-box{background:#131008;border-radius:6px;padding:2rem;max-width:540px;width:100%;max-height:82vh;overflow-y:auto;position:relative}
.modal-close{position:absolute;top:12px;right:16px;background:none;border:none;color:#5a4a3a;font-size:1.5rem;line-height:1}
.modal-emoji{font-size:2.5rem;display:block;margin-bottom:10px}
.modal-name{font-size:1.7rem;color:#e8dcc8;font-weight:400;margin:0 0 3px}
.modal-tagline{font-style:italic;font-size:0.9rem;margin:0 0 0.75rem}
.modal-badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.modal-badge{font-family:monospace;font-size:0.6rem;letter-spacing:0.06em;padding:4px 10px;border-radius:3px}
.fire-box{background:rgba(200,80,30,0.08);border:1px solid rgba(200,80,30,0.25);border-radius:4px;padding:12px 14px;margin-bottom:1.25rem}
.fire-box-title{font-family:monospace;font-size:0.6rem;letter-spacing:0.12em;color:#d4733a;text-transform:uppercase;margin-bottom:6px}
.fire-box-text{font-size:0.9rem;color:#d4b090;line-height:1.6;margin-bottom:6px}
.fire-box-freq{font-family:monospace;font-size:0.6rem;letter-spacing:0.08em;color:#a06040}
.ital-box{border-left:3px solid;padding:10px 14px;border-radius:0 4px 4px 0;margin-bottom:1.25rem}
.ital-text{font-style:italic;font-size:0.88rem;color:#c8b890;line-height:1.6}
.modal-sec{font-family:monospace;font-size:0.6rem;letter-spacing:0.2em;text-transform:uppercase;margin:0 0 8px}
.modal-list{list-style:none;padding:0;margin:0 0 1.25rem}
.modal-list li{font-size:0.88rem;color:#c8b890;padding:3px 0 3px 16px;position:relative;line-height:1.5}
.modal-list li::before{content:"*";position:absolute;left:0;color:#c8732a}
.modal-usage{font-size:0.88rem;color:#c8b890;line-height:1.7;margin:0 0 1.25rem}
.caution-box{background:rgba(180,50,30,0.08);border:1px solid rgba(180,50,30,0.2);border-radius:4px;padding:10px 12px}
.caution-text{font-size:0.82rem;color:#a06050;line-height:1.5}
@media(max-width:600px){.boards{grid-template-columns:repeat(2,1fr)}.hdr-title{font-size:2rem}}
</style>
</head>

var boards = [
  {id:"herbs", label:"Herbalism",    desc:"Teas, leaves, roots and bark. Everyday plant healing."},
  {id:"oils",  label:"Aromatherapy", desc:"Essential oils for healing, mood, space and ritual."},
  {id:"plants",label:"Plant Medicine",desc:"Sacred plants used ceremonially, with intention and respect."},
  {id:"pantry",label:"The Pantry",   desc:"Food as medicine. Sea moss, medicinal mushrooms, healing fruits."},
  {id:"teeth", label:"Teeth & Oral", desc:"Dr.Sebi's tooth powder herbs, natural oral care and ancient mouth practices."}
];

var currentBoard = "herbs";
var currentCat   = "all";

function getData() {
  if (currentBoard === "herbs")  return {items: herbs,  cats: herbCats};
  if (currentBoard === "oils")   return {items: oils,   cats: oilCats};
  if (currentBoard === "plants") return {items: plants, cats: plantCats};
  if (currentBoard === "teeth")  return {items: teeth,  cats: teethCats};
  return {items: pantry, cats: pantryCats};
}

function getItems() {
  var d = getData();
  if (currentCat === "all")    return d.items;
  if (currentCat === "drfire") return d.items.filter(function(x){return x.fire;});
  if (currentCat === "drsebi") return d.items.filter(function(x){return x.sebi || x.c === "drsebi";});
  return d.items.filter(function(x){return x.c === currentCat;});
}

function esc(s) {
  if (!s) return "";
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function render() {
  var board = boards.filter(function(b){return b.id===currentBoard;})[0];
  var d = getData();
  var items = getItems();

  var filterHtml = "";
  for (var k in d.cats) {
    var v = d.cats[k];
    var active = k === currentCat;
    filterHtml += '<button class="filter-btn' + (active?' active':'') + '" style="' + (active ? 'border-color:'+v.col+';background:'+v.col+'22;color:#e8dcc8' : 'border-color:rgba(232,184,75,0.1)') + '" onclick="setCat(\''+k+'\')">' + v.l + '</button>';
  }

  var cardsHtml = "";
  for (var i = 0; i < items.length; i++) {
    var item = items[i];
    var badges = "";
    if (item.fire) badges += '<span class="badge badge-fire">Dr.Fire</span>';
    if (item.sebi || item.c === "drsebi") badges += '<span class="badge badge-sebi">Dr.Sebi</span>';
    var badgeDiv = badges ? '<div class="card-badges">' + badges + '</div>' : '';
    var tagText = item.fire ? item.fire.role : item.t;
    var meta = item.method || item.form || item.trad || "";
    var metaHtml = meta ? '<p class="meta-tag">' + esc(meta) + '</p>' : '';
    cardsHtml += '<div class="card" onclick="openModal('+i+')" style="border-color:'+item.col+'22" onmouseenter="this.style.background=\''+item.col+'18\';this.style.borderColor=\''+item.col+'66\';this.style.transform=\'translateY(-2px)\'" onmouseleave="this.style.background=\'rgba(255,255,255,0.02)\';this.style.borderColor=\''+item.col+'22\';this.style.transform=\'none\'">'
      + '<div class="card-dot" style="background:'+item.col+'"></div>'
      + badgeDiv
      + '<span class="card-emoji">' + item.e + '</span>'
      + '<p class="card-name">' + esc(item.n) + '</p>'
      + '<p class="card-tag" style="color:'+item.col+'">' + esc(tagText) + '</p>'
      + metaHtml
      + '<p class="card-tap">TAP TO OPEN</p>'
      + '</div>';
  }

  var boardBtns = boards.map(function(b){
    return '<button class="board-btn'+(b.id===currentBoard?' active':'')+'" onclick="setBoard(\''+b.id+'\')">' + b.label + '</button>';
  }).join('');

  document.getElementById('root').innerHTML =
    '<div class="wrap">'
    + '<div style="margin-bottom:2rem"><p class="hdr-label">Personal Reference</p><h1 class="hdr-title">The <em>Apothecary</em></h1><p class="hdr-sub">Herbalism - Aromatherapy - Plant Medicine - Food as Medicine</p></div>'
    + '<div class="boards">' + boardBtns + '</div>'
    + '<div class="board-desc">' + esc(board.desc) + '</div>'
    + '<div class="filters">' + filterHtml + '</div>'
    + '<div class="grid">' + cardsHtml + '</div>'
    + '</div>';

  window._items = items;
}

function setBoard(id) { currentBoard = id; currentCat = "all"; render(); }
function setCat(cat)   { currentCat = cat; render(); }

function openModal(idx) {
  var item = window._items[idx];
  if (!item) return;

  document.getElementById('m-emoji').textContent   = item.e || "";
  document.getElementById('m-name').textContent    = item.n;
  document.getElementById('m-tagline').textContent = item.t;
  document.getElementById('m-tagline').style.color = item.col;

  var badges = "";
  if (item.fire) badges += '<span class="modal-badge badge-fire">Dr.Fire Protocol</span>';
  if (item.sebi || item.c === "drsebi") badges += '<span class="modal-badge badge-sebi">Dr.Sebi Approved</span>';
  document.getElementById('m-badges').innerHTML = badges;

  var fb = document.getElementById('m-firebox');
  if (item.fire) {
    fb.style.display = "block";
    document.getElementById('m-firetitle').textContent = "Dr.Fire - " + item.fire.role;
    document.getElementById('m-firetext').textContent  = item.fire.p;
    document.getElementById('m-firefreq').textContent  = "FREQUENCY: " + item.fire.f;
  } else { fb.style.display = "none"; }

  var ib = document.getElementById('m-italbox');
  var noteText = item.i || "";
  if (noteText) {
    ib.style.display = "block";
    ib.style.borderLeftColor = item.col;
    ib.style.background = item.col + "18";
    document.getElementById('m-ital').textContent = noteText;
  } else { ib.style.display = "none"; }

  var trad = document.getElementById('m-tradition');
  var meta = item.trad || item.method || item.form || "";
  if (meta) { trad.style.display = "block"; trad.textContent = meta; }
  else trad.style.display = "none";

  document.getElementById('m-bsec').style.color = item.col;
  var bHtml = "";
  for (var i = 0; i < item.b.length; i++) bHtml += '<li>' + esc(item.b[i]) + '</li>';
  document.getElementById('m-benefits').innerHTML = bHtml;

  document.getElementById('m-usage').textContent   = item.u;
  document.getElementById('m-caution').textContent = item.ca;
  document.getElementById('modal-box').style.borderColor = item.col + "55";
  document.getElementById('modal').classList.add('open');
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }

document.getElementById('modal').addEventListener('click', function(e){ if(e.target===this) closeModal(); });
document.getElementById('modal-close').addEventListener('click', closeModal);

render();
</script>
