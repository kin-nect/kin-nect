<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Apothecary</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{min-height:100%;background:#0d0a06;color:#e8dcc8;font-family:'Cormorant Garamond',Georgia,serif}
    ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#0d0a06}::-webkit-scrollbar-thumb{background:#3a3020;border-radius:3px}
    button{cursor:pointer;font-family:inherit}
    .wrap{max-width:1200px;margin:0 auto;padding:2rem 1.5rem}
    /* Header */
    .hdr-label{font-family:'Space Mono',monospace;font-size:0.65rem;letter-spacing:0.25em;text-transform:uppercase;color:#c8732a;margin-bottom:0.5rem}
    .hdr-title{font-family:'Playfair Display',serif;font-size:2.6rem;font-weight:400;color:#e8dcc8;margin-bottom:0.5rem}
    .hdr-title em{color:#c8732a;font-style:italic}
    .hdr-sub{font-size:1.2rem;color:#c8b890;font-style:italic;letter-spacing:0.03em;margin-bottom:2rem}
    /* Board tabs */
    .boards{display:grid;grid-template-columns:repeat(4,1fr);gap:0.5rem;margin-bottom:0.75rem}
    .board-btn{padding:0.85rem 0.75rem;background:rgba(255,255,255,0.02);border:1px solid rgba(232,220,200,0.1);border-radius:6px;color:#a09080;font-family:'Playfair Display',serif;font-size:1rem;text-align:center;transition:all 0.15s}
    .board-btn.active{background:rgba(200,115,42,0.12);border-color:rgba(200,115,42,0.5);color:#c8732a}
    /* Board desc */
    .board-desc{padding:0.75rem 1rem;background:rgba(200,115,42,0.04);border:1px solid rgba(200,115,42,0.08);border-radius:6px;margin-bottom:1.5rem;font-style:italic;font-size:1.05rem;color:#a09070;line-height:1.6}
    /* Filters */
    .filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.5rem}
    .filter-btn{padding:5px 14px;border:1px solid rgba(232,184,75,0.1);border-radius:2rem;background:transparent;color:#5a4a3a;font-family:'Cormorant Garamond',serif;font-size:0.95rem;transition:all 0.15s}
    .filter-btn.active{color:#e8dcc8}
    /* Grid */
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:1rem}
    /* Card */
    .card{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:8px;padding:1.25rem;cursor:pointer;transition:all 0.2s;position:relative}
    .card:hover{transform:translateY(-2px)}
    .card-dot{position:absolute;top:12px;right:12px;width:8px;height:8px;border-radius:50%;opacity:0.7}
    .card-badges{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
    .badge{font-family:'Space Mono',monospace;font-size:0.52rem;letter-spacing:0.05em;padding:2px 6px;border-radius:2px}
    .badge-fire{background:rgba(200,80,30,0.15);color:#d4733a;border:1px solid rgba(200,80,30,0.3)}
    .badge-sebi{background:rgba(46,139,87,0.15);color:#5aaa7a;border:1px solid rgba(46,139,87,0.3)}
    .card-emoji{font-size:1.8rem;display:block;margin-bottom:8px}
    .card-name{font-family:'Playfair Display',serif;font-size:0.95rem;color:#e8dcc8;margin-bottom:3px}
    .card-tag{font-size:0.8rem;font-style:italic;margin-bottom:8px}
    .card-tap{font-family:'Space Mono',monospace;font-size:0.52rem;letter-spacing:0.1em;color:#6a5a4a;margin-top:6px}
    /* Modal overlay */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:9999;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(3px)}
    .modal-overlay.open{display:flex}
    .modal-box{background:#131008;border-radius:6px;padding:2rem;max-width:540px;width:100%;max-height:82vh;overflow-y:auto;position:relative}
    .modal-close{position:absolute;top:12px;right:16px;background:none;border:none;color:#5a4a3a;font-size:1.5rem;line-height:1}
    .modal-emoji{font-size:2.5rem;display:block;margin-bottom:10px}
    .modal-name{font-family:'Playfair Display',serif;font-size:1.7rem;color:#e8dcc8;font-weight:400;margin:0 0 3px}
    .modal-tagline{font-style:italic;font-size:0.9rem;margin:0 0 0.75rem}
    .modal-badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
    .modal-badge{font-family:'Space Mono',monospace;font-size:0.52rem;letter-spacing:0.08em;padding:4px 10px;border-radius:3px}
    .fire-box{background:rgba(200,80,30,0.08);border:1px solid rgba(200,80,30,0.25);border-radius:4px;padding:12px 14px;margin-bottom:1.25rem}
    .fire-box-title{font-family:'Space Mono',monospace;font-size:0.52rem;letter-spacing:0.15em;color:#d4733a;text-transform:uppercase;margin-bottom:6px}
    .fire-box-text{font-size:0.9rem;color:#d4b090;line-height:1.6;margin-bottom:6px}
    .fire-box-freq{font-family:'Space Mono',monospace;font-size:0.48rem;letter-spacing:0.1em;color:#a06040}
    .ital-box{border-left:3px solid;padding:10px 14px;border-radius:0 4px 4px 0;margin-bottom:1.25rem}
    .ital-text{font-style:italic;font-size:0.85rem;color:#c8b890;line-height:1.6}
    .modal-sec{font-family:'Space Mono',monospace;font-size:0.48rem;letter-spacing:0.25em;text-transform:uppercase;margin:0 0 8px}
    .modal-list{list-style:none;padding:0;margin:0 0 1.25rem}
    .modal-list li{font-size:0.85rem;color:#c8b890;padding:3px 0 3px 16px;position:relative;line-height:1.5}
    .modal-list li::before{content:'✦';position:absolute;left:0;font-size:9px;top:7px}
    .modal-usage{font-size:0.85rem;color:#c8b890;line-height:1.7;margin:0 0 1.25rem}
    .caution-box{background:rgba(180,50,30,0.08);border:1px solid rgba(180,50,30,0.2);border-radius:4px;padding:10px 12px}
    .caution-text{font-size:0.78rem;color:#a06050;line-height:1.5}
    .caution-text strong{color:#c07060;letter-spacing:0.08em}
    @media(max-width:600px){.boards{grid-template-columns:repeat(2,1fr)}.hdr-title{font-size:2rem}}
  </style>
</head>
<body>
<div id="root"></div>
<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal-box" id="modal-box">
    <button class="modal-close" onclick="closeModal()">×</button>
    <span class="modal-emoji" id="m-emoji"></span>
    <h3 class="modal-name" id="m-name"></h3>
    <p class="modal-tagline" id="m-tagline"></p>
    <div class="modal-badges" id="m-badges"></div>
    <div class="fire-box" id="m-firebox" style="display:none">
      <div class="fire-box-title" id="m-firetitle"></div>
      <div class="fire-box-text" id="m-firetext"></div>
      <div class="fire-box-freq" id="m-firefreq"></div>
    </div>
    <div class="ital-box" id="m-italbox" style="display:none">
      <p class="ital-text" id="m-ital"></p>
    </div>
    <div id="m-tradition" style="display:none;font-family:'Space Mono',monospace;font-size:0.48rem;letter-spacing:0.15em;color:#8a7a5a;margin-bottom:1rem;text-transform:uppercase"></div>
    <p class="modal-sec" id="m-bsec" style="color:#c8732a">Benefits</p>
    <ul class="modal-list" id="m-benefits"></ul>
    <p class="modal-sec" style="color:#c8732a">How to use</p>
    <p class="modal-usage" id="m-usage"></p>
    <div class="caution-box"><p class="caution-text"><strong>NOTE: </strong><span id="m-caution"></span></p></div>
  </div>
</div>

<script>
// ── DATA ──
const teas = [
  {name:"Soursop Leaf",emoji:"🌿",category:"cancer",color:"#2d5a27",tagline:"The Cancer Fighter",benefits:["Potent anti-cancer properties — leaves contain acetogenins which inhibit abnormal cell growth","Antioxidant-rich, combating oxidative stress and inflammation","Supports immune system strength","Calms the nervous system — aids sleep and anxiety","Antimicrobial and antifungal properties","Supports healthy blood pressure"],usage:"Steep 3–5 dried leaves in boiling water for 10–15 minutes. Drink 1–2 cups daily. Best in the evening for its calming properties.",ital:"Sacred in Ital healing — seen as one of the most powerful leaves the Most High placed on Earth for bodily restoration.",caution:"Avoid in pregnancy. Do not combine with blood pressure medication without guidance.",drsebi:true},
  {name:"Elderflower",emoji:"🌸",category:"healing",color:"#b8a96a",tagline:"The Immune Blossom",benefits:["Powerful immune booster — especially for colds and flu","Natural antihistamine — relieves hay fever and allergies","Anti-inflammatory, supports sinus health","Gentle detoxifying and diuretic properties","Rich in Vitamin C and flavonoids","Promotes healthy skin from within"],usage:"Steep 1–2 tsp dried flowers in hot (not boiling) water for 5–7 minutes. Drink 2–3 cups during cold/flu season or daily as a tonic.",ital:"The elder tree was revered across many cultures as sacred — a bridge between earthly and spiritual medicine.",caution:"Use flowers only — elderberries and raw bark can be toxic in large amounts.",drsebi:true},
  {name:"Chamomile",emoji:"🌼",category:"calm",color:"#d4a853",tagline:"The Gentle Healer",benefits:["Powerful sleep aid — reduces insomnia and restlessness","Reduces anxiety and stress naturally","Anti-inflammatory — soothes gut and IBS symptoms","Antispasmodic — relieves menstrual cramps","Supports skin health internally","Gentle enough for children"],usage:"Steep 1 heaped tsp in boiling water for 5–10 minutes. Drink 1 cup before bed or when anxious. Add raw honey and lemon.",ital:"One of Jah's most gentle medicines — for when the body and mind need to be held, not pushed.",caution:"Allergy possible if sensitive to ragweed family.",drsebi:true},
  {name:"Raspberry Leaf",emoji:"🍃",category:"woman",color:"#8b3a52",tagline:"The Womb Tonic",benefits:["Tones and strengthens uterine muscles","Eases painful menstruation (dysmenorrhea)","Rich in iron, calcium, magnesium and B vitamins","Traditionally used in late pregnancy to prepare the womb","Balances hormones naturally","Supports milk production when breastfeeding"],usage:"Steep 1–2 tsp in boiling water for 10 minutes. Drink 1–3 cups daily. Especially powerful in the week before menstruation.",ital:"A gift from Jah specifically for the Empress — honouring the sacred creative power of the womb.",caution:"Avoid in early pregnancy (first trimester). Consult a midwife before use in late pregnancy.",drsebi:true},
  {name:"Hibiscus (Sorrel)",emoji:"🌺",category:"heart",color:"#b5294e",tagline:"The Blood Cleanser",drfire:{role:"The Blood",protocol:"Dr.Fire's blood cleaner. Do NOT boil — cold or warm water infusion only. Heat destroys the active compounds needed to cleanse the bloodstream.",freq:"3x per week"},benefits:["Cleans the bloodstream — Dr.Fire's primary blood herb","Significantly lowers high blood pressure (hypertension)","Lowers LDL (bad) cholesterol","Extremely high in Vitamin C — boosts immunity","Powerful antioxidant — anti-ageing","Natural diuretic — reduces water retention"],usage:"Dr.Fire method: do NOT boil. Place dried petals in cold or warm (not hot) water and allow to infuse for several hours or overnight. Drink 3x a week. General use: steep 1–2 tsp in warm water for 5–10 minutes.",ital:"Sorrel — deeply rooted in African and Ital tradition. Red like life itself. The blood is the river of the body — keep it clean.",caution:"May lower blood pressure significantly — monitor if on BP medication. Avoid in pregnancy."},
  {name:"Lavender",emoji:"💜",category:"calm",color:"#7b5ea7",tagline:"The Peace Herb",benefits:["Powerful anxiety and stress reducer","Promotes deep, restorative sleep","Antidepressant properties — lifts mood naturally","Relieves headaches and migraines","Anti-inflammatory and antimicrobial","Balances the nervous system"],usage:"Use sparingly — 1 tsp of flowers per cup, steep 5 minutes. Too strong can be bitter. Blend with chamomile for a potent sleep tea.",ital:"Brings the spirit into alignment — calms the overactive mind so Jah's inner guidance can be heard.",caution:"Excessive use may cause drowsiness. Avoid if pregnant without guidance."},
  {name:"Peppermint",emoji:"🌱",category:"digestive",color:"#1a7a4a",tagline:"The Digestive Warrior",benefits:["Powerful relief for IBS, bloating and gas","Antispasmodic — relaxes intestinal muscles","Clears sinuses and respiratory congestion","Natural pain relief for tension headaches","Antimicrobial properties","Refreshes and energises without caffeine"],usage:"Steep 1–2 tsp fresh or dried leaves for 5–7 minutes. Drink after meals for digestion. Can also inhale the steam for sinus relief.",ital:"Clean, vital and alive — mint speaks to the freshness that Ital living cultivates in every part of life.",caution:"Avoid in acid reflux. Not recommended for infants."},
  {name:"Damiana",emoji:"🌾",category:"spirit",color:"#8b6914",tagline:"The Spirit Lifter",benefits:["Traditional aphrodisiac — supports libido naturally","Antidepressant and mood-elevating properties","Reduces anxiety and emotional exhaustion","Supports the adrenal and reproductive systems","Historically used for spiritual and visionary practices","Hormonal balancing — beneficial for both men and women"],usage:"Steep 1 tsp in boiling water for 10 minutes. Drink 1–2 cups. Blend with rose petals and cinnamon for a warming tonic.",ital:"Used by the Maya and carried forward in Ital practice — a herb that reconnects you to your vital life force.",caution:"Avoid in pregnancy. High doses may have mild psychoactive effects — use with intention.",drsebi:true},
  {name:"Mullein",emoji:"🌿",category:"respiratory",color:"#5a7a3a",tagline:"The Lung Cleanser",drfire:{role:"Liver · Eyes · Legs",protocol:"Dr.Fire uses mullein to clear the liver, support eye health and improve circulation in the legs — alongside its lung-clearing work.",freq:"2–3x daily during cleanse cycles"},benefits:["Premier herb for lung health — expectorant clears mucus","Soothes bronchitis, asthma and chest tightness","Anti-inflammatory for the respiratory tract","Supports recovery from smoking damage","Antimicrobial — fights respiratory infections","Soothes sore throats"],usage:"Steep 1–2 tsp dried leaf in boiling water for 10–15 minutes. Strain well (fine hairs can irritate throat). Drink 2–3 cups daily for respiratory support.",ital:"Jah breathed life into man — mullein is how we keep that breath clean, clear and free.",caution:"Strain thoroughly. Avoid if allergic to the Scrophulariaceae plant family.",drsebi:true},

  {name:"Milk Thistle",emoji:"🌸",category:"liver",color:"#9b59b6",tagline:"The Liver Shield",drfire:{role:"The Liver",protocol:"Shields and regenerates the liver as toxins are pushed through during the Dr.Fire cleanse. Works with mullein to keep the liver processing cleanly.",freq:"Daily during cleanse cycles"},benefits:["Protects and regenerates liver cells — active compound silymarin is one of the most liver-specific medicines in the plant world","Reduces liver inflammation and scarring — used for cirrhosis, hepatitis and fatty liver","Powerful antioxidant — neutralises free radicals in liver tissue","Helps the body process and eliminate toxins efficiently","Supports healthy cholesterol levels","Indirectly eases kidney load by keeping the liver clean"],usage:"Steep 1 tsp crushed seeds or dried herb in boiling water for 10–15 minutes. Drink 1–2 cups daily. During a cleanse: use daily to shield the liver as toxins pass through.",ital:"The liver is the alchemist of the body — it transforms everything that enters. Milk thistle protects that sacred work.",caution:"Generally very safe. Avoid high doses in pregnancy. May lower blood sugar — monitor if diabetic."},

// ── STATE ──
let currentBoard = 'herbs';
let currentCat = 'all';

function getBoardData() {
  if (currentBoard === 'herbs')  return { items: teas,   cats: herbCats };
  if (currentBoard === 'oils')   return { items: oils,   cats: oilCats };
  if (currentBoard === 'plants') return { items: plants, cats: plantCats };
  return { items: pantry, cats: pantryCats };
}

function getItems() {
  const { items } = getBoardData();
  if (currentCat === 'all') return items;
  if (currentCat === 'drfire') return items.filter(i => i.drfire);
  if (currentCat === 'drsebi') return items.filter(i => i.drsebi || i.category === 'drsebi');
  return items.filter(i => i.category === currentCat);
}

function render() {
  const board = boards.find(b => b.id === currentBoard);

  const items = getItems();

  document.getElementById('root').innerHTML = `

      </div>

      <div class="boards">
        ${boards.map(b => `<button class="board-btn${b.id===currentBoard?' active':''}" onclick="setBoard('${b.id}')">${b.label}</button>`).join('')}

          </div>
        `).join('')}
      </div>

  `;

  window._items = items;
}

function setBoard(id) {
  currentBoard = id;
  currentCat = 'all';
  render();
}

function setCat(cat) {
  currentCat = cat;
  render();
}

function openModal(idx) {
  const item = window._items[idx];
  if (!item) return;

  document.getElementById('m-emoji').textContent = item.emoji;
  document.getElementById('m-name').textContent = item.name;
  document.getElementById('m-tagline').textContent = item.tagline;
  document.getElementById('m-tagline').style.color = item.color;

  // Badges
  const badgesEl = document.getElementById('m-badges');
  badgesEl.innerHTML = [
    item.drfire ? `<span class="modal-badge badge-fire">🔥 Dr.Fire Protocol</span>` : '',
    item.drsebi ? `<span class="modal-badge badge-sebi">🌿 Dr.Sebi Approved</span>` : ''
  ].join('');

  // Dr.Fire box
  const firebox = document.getElementById('m-firebox');
  if (item.drfire) {
    firebox.style.display = 'block';
    document.getElementById('m-firetitle').textContent = '🔥 Dr.Fire · ' + item.drfire.role;
    document.getElementById('m-firetext').textContent = item.drfire.protocol;
    document.getElementById('m-firefreq').textContent = 'FREQUENCY: ' + item.drfire.freq;
  } else {
    firebox.style.display = 'none';
  }

  // Ital / note box
  const italbox = document.getElementById('m-italbox');
  const noteText = item.ital || item.note || null;
  if (noteText) {
    italbox.style.display = 'block';
    italbox.style.borderLeftColor = item.color;
    italbox.style.background = item.color + '12';
    document.getElementById('m-ital').textContent = noteText;
  } else {
    italbox.style.display = 'none';
  }

  // Tradition / method / form
  const tradEl = document.getElementById('m-tradition');
  const meta = [item.tradition, item.method?.join(' · '), item.form?.join(' · ')].filter(Boolean).join('   ·   ');
  if (meta) { tradEl.style.display = 'block'; tradEl.textContent = meta; }
  else tradEl.style.display = 'none';

  // Benefits
  document.getElementById('m-bsec').style.color = item.color;
  document.getElementById('m-benefits').innerHTML = item.benefits.map(b => `<li>${b}</li>`).join('');

  document.getElementById('m-usage').textContent = item.usage;
  document.getElementById('m-caution').textContent = item.caution;
  document.getElementById('modal-box').style.borderColor = item.color + '40';
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}
