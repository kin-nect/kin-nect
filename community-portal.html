<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Portal — KIN-NECT</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0d0a06;--card:#131008;--card2:#1a1208;--ochre:#c8732a;--cream:#e8dcc8;--muted:#8a7a5a;--dim:#5a4a3a;--border:rgba(232,220,200,0.08);--border2:rgba(232,220,200,0.15);}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--cream);font-family:Georgia,serif;min-height:100vh;}
  .wrap{display:grid;grid-template-columns:220px 1fr;min-height:100vh;}
  .sidebar{background:rgba(10,7,3,0.98);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;}
  .sb-top{padding:1.5rem 1.25rem 1rem;border-bottom:1px solid var(--border);}
  .sb-logo{font-size:1.1rem;color:var(--ochre);letter-spacing:0.12em;}
  .sb-sub{font-family:'Space Mono',monospace;font-size:0.42rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--dim);margin-top:0.3rem;}
  .profile{padding:1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:0.75rem;}
  .av{width:36px;height:36px;border-radius:50%;border:1px solid var(--ochre);display:flex;align-items:center;justify-content:center;font-size:0.9rem;color:var(--ochre);flex-shrink:0;}
  .pn{font-size:0.9rem;color:var(--cream);}
  .pb{font-family:'Space Mono',monospace;font-size:0.4rem;letter-spacing:0.1em;color:var(--ochre);opacity:0.7;margin-top:0.2rem;}
  nav{padding:0.75rem 0;flex:1;}
  .nsec{font-family:'Space Mono',monospace;font-size:0.4rem;letter-spacing:0.25em;text-transform:uppercase;color:var(--dim);padding:0.75rem 1.25rem 0.3rem;}
  .ni{display:flex;align-items:center;gap:0.6rem;padding:0.6rem 1.25rem;cursor:pointer;font-family:'Space Mono',monospace;font-size:0.5rem;letter-spacing:0.06em;text-transform:uppercase;color:var(--muted);border-left:2px solid transparent;transition:all 0.15s;}
  .ni:hover{color:var(--cream);background:rgba(200,115,42,0.05);}
  .ni.active{color:var(--ochre);border-left-color:var(--ochre);background:rgba(200,115,42,0.06);}
  .nb{margin-left:auto;background:var(--ochre);color:#0d0a06;font-size:0.38rem;padding:0.1rem 0.35rem;border-radius:8px;font-weight:700;}
  .sb-back{padding:1rem 1.25rem;border-top:1px solid var(--border);}
  .sb-back a{font-family:'Space Mono',monospace;font-size:0.42rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--dim);text-decoration:none;}
  .sb-back a:hover{color:var(--muted);}
  main{padding:2rem 2.5rem;overflow-y:auto;}
  .panel{display:none;}.panel.active{display:block;}
  .ph{margin-bottom:1.75rem;}
  .pe{font-family:'Space Mono',monospace;font-size:0.45rem;letter-spacing:0.25em;text-transform:uppercase;color:var(--ochre);opacity:0.6;margin-bottom:0.4rem;}
  .pt{font-size:1.8rem;font-weight:normal;color:var(--cream);letter-spacing:0.04em;}
  .ps{font-size:0.9rem;color:var(--muted);margin-top:0.3rem;line-height:1.5;}
  .view-banner{font-family:'Space Mono',monospace;font-size:0.42rem;letter-spacing:0.12em;text-transform:uppercase;padding:0.5rem 1rem;border-radius:3px;margin-bottom:1.5rem;display:inline-block;}
  .view-banner.community{background:rgba(107,124,94,0.12);color:#8FAE7A;border:1px solid rgba(107,124,94,0.2);}
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:2rem;}
  .stat{background:var(--card);border:1px solid var(--border);border-radius:4px;padding:1.25rem;}
  .sn{font-size:1.7rem;color:var(--ochre);}
  .sl{font-family:'Space Mono',monospace;font-size:0.42rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--dim);margin-top:0.3rem;}
  .sec{margin-bottom:2rem;}
  .sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
  .st{font-size:1rem;color:var(--cream);font-weight:normal;letter-spacing:0.04em;}
  .sl2{font-family:'Space Mono',monospace;font-size:0.42rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--ochre);cursor:pointer;opacity:0.6;}
  .sl2:hover{opacity:1;}
  .g3{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;}
  .g2{display:grid;grid-template-columns:repeat(2,1fr);gap:1rem;}
  .card{background:var(--card);border:1px solid var(--border);border-radius:4px;padding:1.25rem;position:relative;transition:border-color 0.2s;}
  .card:hover{border-color:var(--border2);}
  .ct{font-family:'Space Mono',monospace;font-size:0.4rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--ochre);opacity:0.6;margin-bottom:0.5rem;}
  .cn{font-size:0.95rem;color:var(--cream);margin-bottom:0.3rem;}
  .cd{font-size:0.82rem;color:var(--muted);line-height:1.5;}
  .ca{font-family:'Space Mono',monospace;font-size:0.4rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--ochre);text-decoration:none;display:block;margin-top:0.75rem;opacity:0.6;}
  .ca:hover{opacity:1;}
  .rb{position:absolute;top:0.75rem;right:0.75rem;font-size:0.6rem;color:var(--dim);cursor:pointer;background:none;border:none;}
  .hr{border:none;border-top:1px solid var(--border);margin:1.5rem 0;}
  .elist{display:flex;flex-direction:column;gap:0.75rem;}
  .ei{background:var(--card);border:1px solid var(--border);border-radius:4px;padding:1rem 1.25rem;display:flex;align-items:center;gap:1rem;}
  .edb{text-align:center;min-width:36px;}
  .ed{font-size:1.3rem;color:var(--ochre);line-height:1;}
  .em2{font-family:'Space Mono',monospace;font-size:0.4rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--dim);}
  .einfo{flex:1;}
  .ename{font-size:0.9rem;color:var(--cream);}
  .ewhere{font-family:'Space Mono',monospace;font-size:0.42rem;color:var(--dim);margin-top:0.2rem;letter-spacing:0.06em;}
  .etag{font-family:'Space Mono',monospace;font-size:0.4rem;letter-spacing:0.1em;text-transform:uppercase;padding:0.25rem 0.6rem;border-radius:2px;background:rgba(200,115,42,0.08);color:var(--ochre);}
  .sform{display:flex;flex-direction:column;gap:1.25rem;max-width:460px;}
  .fg{display:flex;flex-direction:column;gap:0.4rem;}
  .fl{font-family:'Space Mono',monospace;font-size:0.45rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--ochre);opacity:0.6;}
  .fi{background:var(--card);border:1px solid var(--border);border-radius:3px;padding:0.7rem 1rem;color:var(--cream);font-family:Georgia,serif;font-size:0.95rem;outline:none;}
  .fi:focus{border-color:var(--border2);}
  .fta{resize:vertical;min-height:72px;}
  .sbtn{background:var(--ochre);color:#0d0a06;font-family:'Space Mono',monospace;font-size:0.48rem;letter-spacing:0.12em;text-transform:uppercase;padding:0.7rem 1.5rem;border:none;border-radius:2rem;cursor:pointer;font-weight:700;align-self:flex-start;}
</style>
</head>

function renderNav(nav) {
  const el = document.getElementById('sidebar-nav');
  el.innerHTML = nav.map(item => {
    if (item.sec) return '<div class="nsec">' + item.sec + '</div>';
    return '<div class="ni" id="nav-' + item.id + '" onclick="loadPanel(\'' + item.id + '\');setActiveNav(\'' + item.id + '\')">' + item.icon + ' ' + item.label + (item.badge ? '<span class="nb">' + item.badge + '</span>' : '') + '</div>';
  }).join('');
  const first = nav.find(i => i.id);
  if (first) setActiveNav(first.id);
}

function setActiveNav(id) {
  document.querySelectorAll('.ni').forEach(n => n.classList.remove('active'));
  const el = document.getElementById('nav-' + id);
  if (el) el.classList.add('active');
}

function loadPanel(id) {
  document.getElementById('main-content').innerHTML =
    '<div class="panel active">' + (panels[id] || '<p style="color:#8a7a5a">Coming soon.</p>') + '</div>';
}

function gotoPanel(id) { loadPanel(id); setActiveNav(id); }

</html>
