<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Portal — KIN-NECT</title>

<style>
  :root{--bg:#0d0a06;--card:#131008;--card2:#1a1208;--ochre:#c8732a;--cream:#e8dcc8;--muted:#8a7a5a;--dim:#5a4a3a;--border:rgba(232,220,200,0.08);--border2:rgba(232,220,200,0.15);}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--cream);font-family:Georgia,serif;min-height:100vh;}
  .wrap{display:grid;grid-template-columns:220px 1fr;min-height:100vh;}

  /* SIDEBAR */
  .sidebar{background:rgba(10,7,3,0.98);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;}
  .sb-top{padding:1.5rem 1.25rem 1rem;border-bottom:1px solid var(--border);}
  .sb-logo{font-size:1.1rem;color:var(--ochre);letter-spacing:0.12em;}
  .sb-sub{font-family:'Space Mono',monospace;font-size:0.42rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--dim);margin-top:0.3rem;}

  /* VIEW TOGGLE */
  .view-toggle{padding:1rem 1.25rem;border-bottom:1px solid var(--border);}
  .vt-label{font-family:'Space Mono',monospace;font-size:0.4rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--dim);margin-bottom:0.5rem;}
  .vt-btns{display:flex;gap:0;border:1px solid var(--border);border-radius:3px;overflow:hidden;}
  .vt-btn{flex:1;padding:0.5rem 0;font-family:'Space Mono',monospace;font-size:0.42rem;letter-spacing:0.06em;text-transform:uppercase;color:var(--muted);background:transparent;border:none;cursor:pointer;transition:all 0.15s;text-align:center;}
  .vt-btn.active{background:var(--ochre);color:#0d0a06;font-weight:700;}

  .profile{padding:1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:0.75rem;}
  .av{width:36px;height:36px;border-radius:50%;border:1px solid var(--ochre);display:flex;align-items:center;justify-content:center;font-size:0.9rem;color:var(--ochre);flex-shrink:0;}
  .pn{font-size:0.9rem;color:var(--cream);}
  .pb{font-family:'Space Mono',monospace;font-size:0.4rem;letter-spacing:0.1em;color:var(--ochre);opacity:0.7;margin-top:0.2rem;}

  nav{padding:0.75rem 0;flex:1;}
  .nsec{font-family:'Space Mono',monospace;font-size:0.4rem;letter-spacing:0.25em;text-transform:uppercase;color:var(--dim);padding:0.75rem 1.25rem 0.3rem;}
  .ni{display:flex;align-items:center;gap:0.6rem;padding:0.6rem 1.25rem;cursor:pointer;font-family:'Space Mono',monospace;font-size:0.5rem;letter-spacing:0.06em;text-transform:uppercase;color:var(--muted);border-left:2px solid transparent;transition:all 0.15s;}
  .ni:hover{color:var(--cream);background:rgba(200,115,42,0.05);}
  .ni.active{color:var(--ochre);border-left-color:var(--ochre);background:rgba(200,115,42,0.06);}
  .nb{margin-left:auto;background:var(--ochre);color:#0d0a06;font-size:0.38rem;padding:0.1rem 0.35rem;border-radius:8px;font-weight:700;}
  .founder-only{} /* shown/hidden via JS */
  .community-only{}

  .sb-back{padding:1rem 1.25rem;border-top:1px solid var(--border);}
  .sb-back a{font-family:'Space Mono',monospace;font-size:0.42rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--dim);text-decoration:none;}
  .sb-back a:hover{color:var(--muted);}

  main{padding:2rem 2.5rem;overflow-y:auto;}
  .panel{display:none;} .panel.active{display:block;}
  .ph{margin-bottom:1.75rem;}
  .pe{font-family:'Space Mono',monospace;font-size:0.45rem;letter-spacing:0.25em;text-transform:uppercase;color:var(--ochre);opacity:0.6;margin-bottom:0.4rem;}
  .pt{font-size:1.8rem;font-weight:normal;color:var(--cream);letter-spacing:0.04em;}
  .ps{font-size:0.9rem;color:var(--muted);margin-top:0.3rem;line-height:1.5;}

  /* VIEW BANNER */
  .view-banner{font-family:'Space Mono',monospace;font-size:0.42rem;letter-spacing:0.12em;text-transform:uppercase;padding:0.5rem 1rem;border-radius:3px;margin-bottom:1.5rem;display:inline-block;}
  .view-banner.founder{background:rgba(200,115,42,0.12);color:var(--ochre);border:1px solid rgba(200,115,42,0.2);}
  .view-banner.community{background:rgba(107,124,94,0.12);color:#8FAE7A;border:1px solid rgba(107,124,94,0.2);}

  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:2rem;}
  .stat{background:var(--card);border:1px solid var(--border);border-radius:4px;padding:1.25rem;}
  .sn{font-size:1.7rem;color:var(--ochre);}
  .sl{font-family:'Space Mono',monospace;font-size:0.42rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--dim);margin-top:0.3rem;}

  .sec{margin-bottom:2rem;}
  .sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
  .st{font-size:1rem;color:var(--cream);font-weight:normal;letter-spacing:0.04em;}
  .sl2{font-family:'Space Mono',monospace;font-size:0.42rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--ochre);cursor:pointer;opacity:0.6;}
  .sl2:hover{opacity:1;}

  .g3{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;}
  .g2{display:grid;grid-template-columns:repeat(2,1fr);gap:1rem;}
  .card{background:var(--card);border:1px solid var(--border);border-radius:4px;padding:1.25rem;position:relative;transition:border-color 0.2s;}
  .card:hover{border-color:var(--border2);}
  .ct{font-family:'Space Mono',monospace;font-size:0.4rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--ochre);opacity:0.6;margin-bottom:0.5rem;}
  .cn{font-size:0.95rem;color:var(--cream);margin-bottom:0.3rem;}
  .cd{font-size:0.82rem;color:var(--muted);line-height:1.5;}
  .ca{font-family:'Space Mono',monospace;font-size:0.4rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--ochre);text-decoration:none;display:block;margin-top:0.75rem;opacity:0.6;}
  .ca:hover{opacity:1;}
  .rb{position:absolute;top:0.75rem;right:0.75rem;font-size:0.6rem;color:var(--dim);cursor:pointer;background:none;border:none;}
  .hr{border:none;border-top:1px solid var(--border);margin:1.5rem 0;}

  /* BACKEND CARDS */
  .be-card{background:var(--card);border:1px solid var(--border);border-radius:4px;padding:1.5rem;text-decoration:none;display:block;transition:border-color 0.2s;}
  .be-card:hover{border-color:rgba(200,115,42,0.4);}
  .be-icon{font-size:1.6rem;margin-bottom:0.75rem;display:block;}
  .be-tag{font-family:'Space Mono',monospace;font-size:0.4rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--ochre);opacity:0.5;margin-bottom:0.35rem;}
  .be-name{font-size:1rem;color:var(--cream);margin-bottom:0.25rem;font-weight:normal;}
  .be-desc{font-size:0.8rem;color:var(--muted);line-height:1.5;}
  .be-badge{font-family:'Space Mono',monospace;font-size:0.38rem;letter-spacing:0.1em;color:var(--dim);border:1px solid var(--border);padding:0.2rem 0.5rem;border-radius:2px;margin-top:0.75rem;display:inline-block;}

  /* APOTHECARY */
  .af-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.25rem;}
  .af-btn{padding:4px 12px;border:1px solid var(--border);border-radius:2rem;background:transparent;color:var(--muted);font-size:0.75rem;cursor:pointer;font-family:Georgia,serif;letter-spacing:0.06em;transition:all 0.15s;}
  .af-btn.active{border-color:var(--border2);color:var(--cream);}
  .hg{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:1rem;}
  .hc{background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:4px;padding:1.25rem;cursor:pointer;transition:all 0.2s;position:relative;}
  .hc-dot{position:absolute;top:12px;right:12px;width:8px;height:8px;border-radius:50%;opacity:0.7;}
  .hc-emoji{font-size:1.8rem;margin-bottom:8px;display:block;}
  .hc-name{font-size:0.95rem;color:var(--cream);margin:0 0 3px;}
  .hc-tag{font-size:0.75rem;font-style:italic;margin:0 0 10px;}
  .hc-list{list-style:none;padding:0;margin:0 0 10px;}
  .hc-list li{font-size:0.73rem;color:var(--muted);padding:2px 0 2px 10px;position:relative;line-height:1.4;}
  .hc-list li::before{content:'·';position:absolute;left:0;}
  .hc-tap{font-family:'Space Mono',monospace;font-size:0.38rem;letter-spacing:0.1em;color:var(--dim);}

  /* EVENTS */
  .elist{display:flex;flex-direction:column;gap:0.75rem;}
  .ei{background:var(--card);border:1px solid var(--border);border-radius:4px;padding:1rem 1.25rem;display:flex;align-items:center;gap:1rem;}
  .edb{text-align:center;min-width:36px;}
  .ed{font-size:1.3rem;color:var(--ochre);line-height:1;}
  .em2{font-family:'Space Mono',monospace;font-size:0.4rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--dim);}
  .einfo{flex:1;}
  .ename{font-size:0.9rem;color:var(--cream);}
  .ewhere{font-family:'Space Mono',monospace;font-size:0.42rem;color:var(--dim);margin-top:0.2rem;letter-spacing:0.06em;}
  .etag{font-family:'Space Mono',monospace;font-size:0.4rem;letter-spacing:0.1em;text-transform:uppercase;padding:0.25rem 0.6rem;border-radius:2px;background:rgba(200,115,42,0.08);color:var(--ochre);}

  /* SETTINGS */
  .sform{display:flex;flex-direction:column;gap:1.25rem;max-width:460px;}
  .fg{display:flex;flex-direction:column;gap:0.4rem;}
  .fl{font-family:'Space Mono',monospace;font-size:0.45rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--ochre);opacity:0.6;}
  .fi{background:var(--card);border:1px solid var(--border);border-radius:3px;padding:0.7rem 1rem;color:var(--cream);font-family:Georgia,serif;font-size:0.95rem;outline:none;}
  .fi:focus{border-color:var(--border2);}
  .fta{resize:vertical;min-height:72px;}
  .sbtn{background:var(--ochre);color:#0d0a06;font-family:'Space Mono',monospace;font-size:0.48rem;letter-spacing:0.12em;text-transform:uppercase;padding:0.7rem 1.5rem;border:none;border-radius:2rem;cursor:pointer;font-weight:700;align-self:flex-start;}

  /* HERB MODAL */
  .moverlay{position:fixed;inset:0;background:rgba(0,0,0,0.88);display:none;align-items:center;justify-content:center;padding:1rem;z-index:9999;backdrop-filter:blur(3px);}
  .moverlay.open{display:flex;}
  .mbox{background:#131008;border-radius:6px;padding:2rem;max-width:540px;width:100%;max-height:80vh;overflow-y:auto;position:relative;}
  .mc{position:absolute;top:12px;right:16px;background:none;border:none;color:var(--dim);font-size:1.5rem;cursor:pointer;line-height:1;}
  .me{font-size:2.5rem;display:block;margin-bottom:10px;}
  .mn{font-size:1.7rem;color:var(--cream);font-weight:normal;margin:0 0 3px;}
  .msl{font-style:italic;font-size:0.85rem;margin:0 0 1.25rem;}
  .ib{border-left:3px solid;padding:10px 14px;border-radius:0 4px 4px 0;margin-bottom:1.25rem;}
  .ib p{margin:0;font-size:0.85rem;font-style:italic;color:#c8b890;line-height:1.6;}
  .msec{font-family:'Space Mono',monospace;font-size:0.42rem;letter-spacing:0.25em;text-transform:uppercase;margin:0 0 8px;}
  .mlist{list-style:none;padding:0;margin:0 0 1.25rem;}
  .mlist li{font-size:0.85rem;color:#c8b890;padding:3px 0 3px 16px;position:relative;line-height:1.5;}
  .mlist li::before{content:'✦';position:absolute;left:0;font-size:9px;top:7px;}
  .musage{font-size:0.85rem;color:#c8b890;line-height:1.7;margin:0 0 1.25rem;}
  .mcaut{background:rgba(180,50,30,0.08);border:1px solid rgba(180,50,30,0.2);border-radius:4px;padding:10px 12px;}
  .mcaut p{margin:0;font-size:0.78rem;color:#a06050;line-height:1.5;}
</style>
</head>

  currentView = view;
  document.querySelectorAll('.vt-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  // Update profile
  if (view === 'founder') {
    document.getElementById('sb-name').textContent = 'Jayde';
    document.getElementById('sb-role').textContent = '✦ Founder & Director';
    document.getElementById('sb-role').style.color = 'var(--ochre)';
    renderNav(founderNav);
    loadPanel('f-overview');
  } else {
    document.getElementById('sb-name').textContent = 'Muna';
    document.getElementById('sb-role').textContent = '🌿 Community Member';
    document.getElementById('sb-role').style.color = '#8FAE7A';
    renderNav(communityNav);
    loadPanel('c-overview');
  }
}

function renderNav(navConfig) {
  const nav = document.getElementById('sidebar-nav');
  nav.innerHTML = navConfig.map(item => {
    if (item.sec) return `<div class="nsec">${item.sec}</div>`;
    return `<div class="ni" id="nav-${item.id}" onclick="loadPanel('${item.id}');setActiveNav('${item.id}')">${item.icon} ${item.label}${item.badge ? `<span class="nb">${item.badge}</span>` : ''}</div>`;
  }).join('');
  // Set first item active
  const firstItem = navConfig.find(i => i.id);
  if (firstItem) setActiveNav(firstItem.id);
}

function setActiveNav(id) {
  document.querySelectorAll('.ni').forEach(n => n.classList.remove('active'));
  const el = document.getElementById('nav-' + id);
  if (el) el.classList.add('active');
}

function loadPanel(id) {
  currentPanel = id;
  const main = document.getElementById('main-content');
  main.innerHTML = `<div id="panel-${id}" class="panel active">${panels[id] || '<p style="color:var(--muted)">Coming soon.</p>'}</div>`;
  // Init herbs if needed
  if (id === 'f-apothecary' || id === 'c-apothecary') {
    herbFilter = 'all';
    renderHerbFilters();
    renderHerbs();
  }
}

function gotoPanel(id) {
  loadPanel(id);
  setActiveNav(id);
}

// ── HERBS ──
function renderHerbs() {
  const f = herbFilter === 'all' ? herbs : herbs.filter(h => h.cat === herbFilter);
  const hg = document.getElementById('hg');
  if (!hg) return;
  hg.innerHTML = f.map(h => `<div class="hc" onclick='oH(${JSON.stringify(h).replace(/'/g,"&#39;")})' style="border-color:${h.color}20" onmouseenter="this.style.background='${h.color}15';this.style.borderColor='${h.color}60';this.style.transform='translateY(-2px)'" onmouseleave="this.style.background='rgba(255,255,255,0.02)';this.style.borderColor='${h.color}20';this.style.transform='none'"><div class="hc-dot" style="background:${h.color}"></div><span class="hc-emoji">${h.emoji}</span><p class="hc-name">${h.name}</p><p class="hc-tag" style="color:${h.color}">${h.tagline}</p><ul class="hc-list">${h.benefits.slice(0,2).map(b=>`<li>${b.split('—')[0].trim()}</li>`).join('')}</ul><p class="hc-tap">TAP TO OPEN →</p></div>`).join('');
}

function renderHerbFilters() {
  const row = document.getElementById('af-row');
  if (!row) return;
  row.innerHTML = Object.entries(herbCats).map(([k,v]) => `<button class="af-btn ${k===herbFilter?'active':''}" onclick="setHerbFilter('${k}')">${v}</button>`).join('');
}

function setHerbFilter(c) { herbFilter = c; renderHerbFilters(); renderHerbs(); }

function oH(h) {
  document.getElementById('hm-e').textContent = h.emoji;
  document.getElementById('hm-n').textContent = h.name;
  document.getElementById('hm-t').textContent = h.tagline;
  document.getElementById('hm-t').style.color = h.color;
  document.getElementById('hm-i').textContent = h.ital;
  document.getElementById('hm-ib').style.borderLeftColor = h.color;
  document.getElementById('hm-ib').style.background = h.color + '12';
  document.getElementById('hm-bl').style.color = h.color;
  document.getElementById('hm-b').innerHTML = h.benefits.map(b => `<li>${b}</li>`).join('');
  document.getElementById('hm-u').textContent = h.usage;
  document.getElementById('hm-c').textContent = h.caution;
  document.getElementById('hm-box').style.borderColor = h.color + '40';
  document.getElementById('hm').classList.add('open');
}

// ── INIT ──
renderNav(founderNav);
loadPanel('f-overview');
</script>
</body>
</html>
